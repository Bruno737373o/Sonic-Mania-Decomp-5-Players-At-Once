name: Build Sonic Mania APK (5 Players)

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java 11
        # O Java 11 evita o erro de recursão (isCanCancel) no Gradle 7.5.1
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Install NDK 24 via Command Line
        # Usamos uma forma manual de instalar o NDK para não depender do Java 17
        run: |
          sudo ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager --install "ndk;24.0.8215888" --sdk_root=${ANDROID_SDK_ROOT}
          echo "NDK_PATH=${ANDROID_SDK_ROOT}/ndk/24.0.8215888" >> $GITHUB_ENV

      - name: Build APK
        run: |
          cd dependencies/RSDKv5/android
          
          # Limpeza total de estados anteriores
          rm -rf .gradle app/build .cxx
          
          # Fix permissões
          sed -i 's/\r$//' gradlew
          chmod +x gradlew
          
          # Setup local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          echo "ndk.dir=${{ env.NDK_PATH }}" >> local.properties

          # EXECUÇÃO ULTRA-ESTÁVEL
          # --no-parallel: Mata o erro de recursão isCanCancel
          # --max-workers 1: Garante que o Gradle não tente ser "esperto" e quebre
          # -Pandroid.overridePathCheck=true: Evita erros de caminhos longos no Linux
          ./gradlew assembleDebug \
            --no-daemon \
            --no-parallel \
            --max-workers 1 \
            -Pandroid.overridePathCheck=true \
            -Dorg.gradle.vfs.watch=false \
            -x lint || {
              echo "----------------------------------------------------"
              echo "ERRO DETECTADO. BUSCANDO CAUSA NO LOG DO SISTEMA..."
              echo "----------------------------------------------------"
              # Se o Gradle travar, tentamos ler o log de saída do compilador
              find . -name "android_gradle_build_stderr.txt" -exec cat {} +
              exit 1
            }
          
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Sonic-Mania-5Players-APK
          path: dependencies/RSDKv5/android/app/build/outputs/apk/debug/*.apk
