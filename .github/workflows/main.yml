name: Build Sonic Mania APK (5 Players)

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK
        run: |
          # 1. Localizar NDK
          NDK_PATH=$(ls -d $ANDROID_SDK_ROOT/ndk/* | tail -1)
          
          # 2. Entrar na pasta do projeto
          cd dependencies/RSDKv5/android
          
          # 3. Corrigir quebras de linha (essencial)
          sed -i 's/\r$//' gradlew
          chmod +x gradlew
          
          # 4. Executar o Build com LOG DETALHADO
          # --stacktrace: Mostra onde o erro ocorreu no Java/Gradle
          # -Pandroid.bundle.enableUncompressedNativeLibs=false: Evita erros de alinhamento de biblioteca
          ./gradlew assembleRelease \
            -Pandroid.ndkPath=$NDK_PATH \
            -Pandroid.lintOptions.abortOnError=false \
            --stacktrace
          
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Sonic-Mania-5Players-APK
          path: dependencies/RSDKv5/android/app/build/outputs/apk/release/*.apk
