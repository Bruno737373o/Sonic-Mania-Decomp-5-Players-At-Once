name: Build Sonic Mania APK (5 Players)

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Forçamos a instalação da versão r25c, que é a mais estável para esse código
      - name: Setup Android NDK
        run: |
          sudo ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager --install "ndk;25.2.9519653"
          echo "NDK_PATH=${ANDROID_SDK_ROOT}/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Build APK
        run: |
          cd dependencies/RSDKv5/android
          
          # Corrigir quebras de linha (CRLF para LF)
          sed -i 's/\r$//' gradlew
          chmod +x gradlew
          
          # Limpeza total antes de começar
          ./gradlew clean
          
          # Build usando a versão específica do NDK que instalamos
          ./gradlew assembleDebug \
            -Pandroid.ndkPath=${{ env.NDK_PATH }} \
            --no-daemon \
            --stacktrace
          
      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Sonic-Mania-5Players-APK
          path: |
            dependencies/RSDKv5/android/app/build/outputs/apk/debug/*.apk
