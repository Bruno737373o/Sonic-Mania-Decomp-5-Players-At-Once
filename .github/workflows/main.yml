name: Build Sonic Mania APK (5 Players)

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Java 17
        # Java 17 é necessário para o sdkmanager moderno e funciona com Gradle 7.5.1
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android NDK (Version 24)
        run: |
          # Agora com Java 17, o sdkmanager vai funcionar
          ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager --install "ndk;24.0.8215888"
          echo "NDK_PATH=${ANDROID_SDK_ROOT}/ndk/24.0.8215888" >> $GITHUB_ENV

      - name: Build APK
        run: |
          cd dependencies/RSDKv5/android
          
          # Correção de arquivos
          sed -i 's/\r$//' gradlew
          chmod +x gradlew
          
          # Limpeza de lixo
          rm -rf .gradle app/build .cxx
          
          # Configura local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          echo "ndk.dir=${{ env.NDK_PATH }}" >> local.properties

          # FLAGS DE ESTABILIDADE (Cura para o erro Node.isCanCancel)
          # --no-daemon: Evita processos em segundo plano
          # --no-parallel: Evita o loop de nós (StackOverflow) do Gradle
          # -Dorg.gradle.vfs.watch=false: Evita travamento de arquivos no Linux
          ./gradlew assembleDebug \
            --no-daemon \
            --no-parallel \
            -Dorg.gradle.vfs.watch=false \
            --stacktrace || {
              echo "----------------------------------------------------"
              echo "ERRO DETECTADO NO CMAKE (C++):"
              echo "----------------------------------------------------"
              find . -name "android_gradle_build_stderr.txt" -exec cat {} +
              exit 1
            }

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Sonic-Mania-5Players-APK
          path: dependencies/RSDKv5/android/app/build/outputs/apk/debug/*.apk
