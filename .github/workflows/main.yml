name: Build Sonic Mania APK (5 Players)

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install NDK 24
        run: |
          ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager --install "ndk;24.0.8215888"
          echo "NDK_PATH=${ANDROID_SDK_ROOT}/ndk/24.0.8215888" >> $GITHUB_ENV

      - name: Prepare
        run: |
          cd dependencies/RSDKv5/android
          sed -i 's/gradle-7.5.1-bin.zip/gradle-7.4-bin.zip/g' gradle/wrapper/gradle-wrapper.properties
          echo "org.gradle.jvmargs=-Xss4m -Xmx2048m" >> gradle.properties
          sed -i 's/\r$//' gradlew
          chmod +x gradlew
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          echo "ndk.dir=${{ env.NDK_PATH }}" >> local.properties

      - name: Build APK (Show Java Errors)
        run: |
          cd dependencies/RSDKv5/android
          
          # Rodamos com -q (quiet) e capturamos apenas os erros do compilador Java
          ./gradlew assembleDebug -x lint --console=plain || {
            echo "----------------------------------------------------"
            echo "LISTA DE ERROS NO CÓDIGO JAVA:"
            echo "----------------------------------------------------"
            # Este comando vai procurar os erros de compilação no log
            ./gradlew compileDebugJavaWithJavac --stacktrace
            exit 1
          }
