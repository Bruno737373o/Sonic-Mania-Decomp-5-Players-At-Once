name: Build Sonic Mania APK (5 Players)

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android NDK
        run: |
          ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager --install "ndk;25.2.9519653"
          echo "NDK_PATH=${ANDROID_SDK_ROOT}/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Build APK
        run: |
          cd dependencies/RSDKv5/android
          sed -i 's/\r$//' gradlew
          chmod +x gradlew
          
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          echo "ndk.dir=${{ env.NDK_PATH }}" >> local.properties

          # --debug e --stacktrace vão mostrar o erro real do C++ (Clang/Ninja)
          ./gradlew assembleDebug \
            -Pandroid.ndkPath=${{ env.NDK_PATH }} \
            --stacktrace --debug
          
      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Sonic-Mania-5Players-APK
          # Busca em qualquer subpasta de build para garantir que ache o APK
          path: dependencies/RSDKv5/android/**/build/outputs/apk/**/*.apk
