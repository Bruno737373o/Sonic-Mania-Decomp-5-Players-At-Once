name: Build Sonic Mania APK (5 Players)

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build APK
        run: |
          # 1. Localizar o NDK
          NDK_PATH=$(ls -d $ANDROID_SDK_ROOT/ndk/* | tail -1)
          echo "Usando NDK em: $NDK_PATH"
          
          # 2. Entrar no diretório
          cd dependencies/RSDKv5/android
          
          # 3. CORREÇÃO CRÍTICA: Remover caracteres de Windows do gradlew (CRLF -> LF)
          sed -i 's/\r$//' gradlew
          
          # 4. Garantir permissão de execução
          chmod +x gradlew
          
          # 5. Executar o build
          ./gradlew assembleRelease -Pandroid.ndkPath=$NDK_PATH

          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Sonic-Mania-5Players-APK
          path: dependencies/RSDKv5/android/app/build/outputs/apk/release/*.apk
