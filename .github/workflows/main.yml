name: Build Sonic Mania APK (5 Players)

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android NDK (Version 24)
        run: |
          # Instalando exatamente a versão que o seu projeto exige: 24.0.8215888
          ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager --install "ndk;24.0.8215888"
          echo "NDK_PATH=${ANDROID_SDK_ROOT}/ndk/24.0.8215888" >> $GITHUB_ENV

      - name: Build APK
        run: |
          cd dependencies/RSDKv5/android
          
          # Fix line endings
          sed -i 's/\r$//' gradlew
          chmod +x gradlew
          
          # Configura local.properties com a versão correta
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          echo "ndk.dir=${{ env.NDK_PATH }}" >> local.properties

          # Executa o build
          # Removi o -Pandroid.ndkPath para deixar o Gradle usar o ndkVersion do build.gradle
          ./gradlew assembleDebug --no-daemon --stacktrace || {
            echo "----------------------------------------------------"
            echo "ERRO NATIVO DETECTADO NO CMAKE:"
            echo "----------------------------------------------------"
            find . -name "android_gradle_build_stderr.txt" -exec cat {} +
            exit 1
          }

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Sonic-Mania-5Players-APK
          path: dependencies/RSDKv5/android/app/build/outputs/apk/debug/*.apk
