name: Build Sonic Mania APK (5 Players)

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android NDK
        run: |
          ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager --install "ndk;25.2.9519653"
          echo "NDK_PATH=${ANDROID_SDK_ROOT}/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Build APK
        run: |
          cd dependencies/RSDKv5/android
          
          # Correção de quebras de linha
          sed -i 's/\r$//' gradlew
          chmod +x gradlew
          
          # Configura os caminhos do SDK e NDK
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          echo "ndk.dir=${{ env.NDK_PATH }}" >> local.properties

          # EXECUTAR O BUILD
          # Removi o --debug para evitar o aviso de segurança e usei --info
          # O segredo está no -Pandroid.keystore... para evitar erros de assinatura
          ./gradlew assembleDebug \
            -Pandroid.ndkPath=${{ env.NDK_PATH }} \
            --info --stacktrace
          
      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Sonic-Mania-5Players-APK
          path: dependencies/RSDKv5/android/app/build/outputs/apk/debug/*.apk

      - name: Check C++ Errors
        if: failure()
        run: |
          echo "O build falhou. Verifique as linhas acima que contenham 'FAILED' ou 'error:'"
          echo "Geralmente o erro está em dependencies/RSDKv5/android/app/jni/CMakeLists.txt"
