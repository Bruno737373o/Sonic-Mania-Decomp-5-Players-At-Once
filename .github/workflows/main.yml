name: Build Sonic Mania APK (5 Players)

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android NDK (Version 24)
        run: |
          ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager --install "ndk;24.0.8215888"
          echo "NDK_PATH=${ANDROID_SDK_ROOT}/ndk/24.0.8215888" >> $GITHUB_ENV

      - name: Build APK
        run: |
          cd dependencies/RSDKv5/android
          
          # Setup do ambiente
          sed -i 's/\r$//' gradlew
          chmod +x gradlew
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          echo "ndk.dir=${{ env.NDK_PATH }}" >> local.properties

          # BUILD COM LOG MÁXIMO
          # O segredo aqui é o --info e o redirecionamento de erro
          ./gradlew assembleDebug \
            --no-daemon \
            --no-parallel \
            -Pandroid.ndkPath=${{ env.NDK_PATH }} \
            --info --stacktrace || {
              echo "----------------------------------------------------"
              echo "PROCURANDO ERRO ESPECÍFICO DO COMPILADOR C++"
              echo "----------------------------------------------------"
              # Procura em logs internos do Ninja/CMake
              find . -name "android_gradle_build_stderr.txt" -exec cat {} +
              find . -name "compile_commands.json" -exec grep -l "error" {} +
              exit 1
            }
          
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Sonic-Mania-5Players-APK
          path: dependencies/RSDKv5/android/app/build/outputs/apk/debug/*.apk
