name: Build Sonic Mania APK (5 Players)

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android NDK (Version 24)
        run: |
          ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager --install "ndk;24.0.8215888"
          echo "NDK_PATH=${ANDROID_SDK_ROOT}/ndk/24.0.8215888" >> $GITHUB_ENV

      - name: Build APK
        run: |
          cd dependencies/RSDKv5/android
          
          # Fix line endings e permissões
          sed -i 's/\r$//' gradlew
          chmod +x gradlew
          
          # Criar local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          echo "ndk.dir=${{ env.NDK_PATH }}" >> local.properties

          # COMPILAÇÃO COM LOG VERBOSO DO CMAKE
          # Adicionamos -Pandroid.ndkPath e flags para o Ninja mostrar o erro no console
          ./gradlew assembleDebug \
            --no-daemon \
            --no-parallel \
            -Pandroid.ndkPath=${{ env.NDK_PATH }} \
            --info || {
              echo "----------------------------------------------------"
              echo "BUSCANDO LOGS DE ERRO EM TODOS OS DIRETÓRIOS .cxx"
              echo "----------------------------------------------------"
              # Procura por qualquer arquivo de texto dentro da pasta oculta de build nativo
              find .cxx -name "*.txt" -exec grep -l "error:" {} + | xargs cat
              exit 1
            }

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Sonic-Mania-5Players-APK
          path: dependencies/RSDKv5/android/app/build/outputs/apk/debug/*.apk
