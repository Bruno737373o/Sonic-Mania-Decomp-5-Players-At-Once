name: Build Sonic Mania APK (5 Players)

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

env:
  # Força o uso do Node 24 para evitar os avisos de depreciação do GitHub
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android NDK
        run: |
          # Instalando a versão r25c (compatível com CMake antigo)
          ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager --install "ndk;25.2.9519653"
          echo "NDK_PATH=${ANDROID_SDK_ROOT}/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Build APK
        run: |
          cd dependencies/RSDKv5/android
          
          # Remove CR do Windows (Causa erro 127/Execução)
          sed -i 's/\r$//' gradlew
          chmod +x gradlew
          
          # Limpeza de builds anteriores e arquivos temporários
          rm -rf .externalNativeBuild .cxx app/build
          
          # Criação do local.properties forçado
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          echo "ndk.dir=${{ env.NDK_PATH }}" >> local.properties

          # Execução com flags de compatibilidade
          ./gradlew assembleDebug \
            -Pandroid.ndkPath=${{ env.NDK_PATH }} \
            -Dorg.gradle.daemon=false \
            -Dorg.gradle.jvmargs="-Xmx2048m" \
            --stacktrace --info
          
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Sonic-Mania-5Players-APK
          path: dependencies/RSDKv5/android/app/build/outputs/apk/debug/*.apk

      - name: Debug Failure
        if: failure()
        run: |
          echo "O build falhou em menos de 30 segundos."
          echo "Isso geralmente significa erro no CMake ou falta de arquivos."
          echo "Verifique se 'dependencies/RSDKv5/android/app/jni/src/CMakeLists.txt' existe."
