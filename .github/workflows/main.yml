name: Build Sonic Mania APK (5 Players)

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Java 11
        # Alterado para Java 11, que é mais estável para o Gradle 7.5.1 e Android antigo
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Setup Android NDK (Version 24)
        run: |
          ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager --install "ndk;24.0.8215888"
          echo "NDK_PATH=${ANDROID_SDK_ROOT}/ndk/24.0.8215888" >> $GITHUB_ENV

      - name: Build APK
        run: |
          cd dependencies/RSDKv5/android
          
          # Fix line endings
          sed -i 's/\r$//' gradlew
          chmod +x gradlew
          
          # Limpeza agressiva para evitar o loop de nós do Gradle
          rm -rf .gradle app/build .cxx
          
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          echo "ndk.dir=${{ env.NDK_PATH }}" >> local.properties

          # FLAGS CRÍTICAS:
          # --no-daemon: Evita processos fantasmas
          # --no-parallel: Impede o loop infinito de execução (Node.isCanCancel)
          # -Dorg.gradle.vfs.watch=false: Desativa monitoramento de arquivos que buga no Linux
          ./gradlew assembleDebug \
            --no-daemon \
            --no-parallel \
            -Dorg.gradle.vfs.watch=false \
            -Pandroid.ndkPath=${{ env.NDK_PATH }} \
            --stacktrace || {
              echo "----------------------------------------------------"
              echo "ERRO NATIVO DETECTADO NO CMAKE:"
              echo "----------------------------------------------------"
              # Se falhar aqui, o erro aparecerá no console
              find . -name "android_gradle_build_stderr.txt" -exec cat {} +
              exit 1
            }

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Sonic-Mania-5Players-APK
          path: dependencies/RSDKv5/android/app/build/outputs/apk/debug/*.apk
