name: Build Sonic Mania APK (5 Players)

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android NDK (Version 24)
        run: |
          ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager --install "ndk;24.0.8215888"
          echo "NDK_PATH=${ANDROID_SDK_ROOT}/ndk/24.0.8215888" >> $GITHUB_ENV

      - name: Prepare Source
        run: |
          cd dependencies/RSDKv5/android
          sed -i 's/\r$//' gradlew
          chmod +x gradlew
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          echo "ndk.dir=${{ env.NDK_PATH }}" >> local.properties

      - name: Build APK
        run: |
          cd dependencies/RSDKv5/android
          
          # Limpando tudo para garantir que o erro de syntax do Java seja reavaliado
          ./gradlew clean
          
          # assembleDebug ignorando erros de análise estética (Lint)
          ./gradlew assembleDebug \
            --no-daemon \
            --no-parallel \
            -x lint \
            -Pandroid.ndkPath=${{ env.NDK_PATH }} \
            --stacktrace
          
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Sonic-Mania-5Players-APK
          path: dependencies/RSDKv5/android/app/build/outputs/apk/debug/*.apk
          
