name: Build Sonic Mania APK (5 Players)

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java 17
        # Precisamos do 17 para o sdkmanager não dar erro de LinkageError
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install NDK 24
        run: |
          # Agora o sdkmanager vai funcionar porque estamos no Java 17
          ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager --install "ndk;24.0.8215888"
          echo "NDK_PATH=${ANDROID_SDK_ROOT}/ndk/24.0.8215888" >> $GITHUB_ENV

      - name: Downgrade & Fix Gradle
        run: |
          cd dependencies/RSDKv5/android
          
          # Força o Downgrade do Gradle para a 7.4 (estabilidade)
          sed -i 's/gradle-7.5.1-bin.zip/gradle-7.4-bin.zip/g' gradle/wrapper/gradle-wrapper.properties
          
          # Aumenta a pilha de memória (Stack) para evitar o erro de recursão
          echo "org.gradle.jvmargs=-Xss4m -Xmx2048m" >> gradle.properties
          
          # Fix permissões
          sed -i 's/\r$//' gradlew
          chmod +x gradlew
          
          # Setup local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          echo "ndk.dir=${{ env.NDK_PATH }}" >> local.properties

      - name: Build APK
        run: |
          cd dependencies/RSDKv5/android
          
          # Limpeza
          ./gradlew clean
          
          # Build Linear (Evita o loop isCanCancel)
          # Se o Gradle 7.4 reclamar do Java 17, ele avisará aqui
          ./gradlew assembleDebug \
            --no-daemon \
            --no-parallel \
            --max-workers 1 \
            -Dorg.gradle.vfs.watch=false \
            -x lint \
            --stacktrace || {
              echo "----------------------------------------------------"
              echo "ERRO NATIVO NO C++ DETECTADO:"
              echo "----------------------------------------------------"
              find . -name "android_gradle_build_stderr.txt" -exec cat {} +
              exit 1
            }
          
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Sonic-Mania-5Players-APK
          path: dependencies/RSDKv5/android/app/build/outputs/apk/debug/*.apk
