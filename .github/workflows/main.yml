name: Build Sonic Mania APK (5 Players)

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android NDK
        run: |
          # Instalando uma versão específica e estável para projetos antigos
          ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager --install "ndk;25.2.9519653"
          echo "NDK_PATH=${ANDROID_SDK_ROOT}/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Build APK
        run: |
          cd dependencies/RSDKv5/android
          
          # Fix para quebras de linha Windows
          sed -i 's/\r$//' gradlew
          chmod +x gradlew
          
          # Criar arquivo local.properties manualmente para garantir que o SDK/NDK sejam vistos
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          echo "ndk.dir=${{ env.NDK_PATH }}" >> local.properties

          # Executar build ignorando erros não críticos e forçando o NDK
          ./gradlew assembleDebug \
            -Pandroid.ndkPath=${{ env.NDK_PATH }} \
            -Dorg.gradle.daemon=false \
            -Dorg.gradle.parallel=false \
            --stacktrace
          
      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Sonic-Mania-5Players-APK
          path: |
            dependencies/RSDKv5/android/app/build/outputs/apk/debug/*.apk
