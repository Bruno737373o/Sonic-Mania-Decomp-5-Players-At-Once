name: Build Sonic Mania APK (5 Players)

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install NDK 24
        run: |
          ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager --install "ndk;24.0.8215888"
          echo "NDK_PATH=${ANDROID_SDK_ROOT}/ndk/24.0.8215888" >> $GITHUB_ENV

      - name: Reconstruct Project Structure
        run: |
          # Movemos o projeto Android para fora da pasta de dependências para simplificar a árvore do Gradle
          mkdir -p build-root
          cp -r dependencies/RSDKv5/android/* build-root/
          
          # Ajustamos os caminhos do local.properties na nova pasta
          cd build-root
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          echo "ndk.dir=${{ env.NDK_PATH }}" >> local.properties
          
          # Garantimos que o gradlew tenha permissão e formato Linux
          sed -i 's/\r$//' gradlew
          chmod +x gradlew

      - name: Build APK (Final Attempt)
        run: |
          cd build-root
          
          # Rodamos o build com flags de memória aumentada para evitar o StackOverflow
          export GRADLE_OPTS="-Xss4m -Xmx2048m"
          
          ./gradlew assembleDebug \
            --no-daemon \
            --no-parallel \
            -Dorg.gradle.vfs.watch=false \
            -x lint \
            --stacktrace || {
              echo "----------------------------------------------------"
              echo "ERRO NATIVO DETECTADO NO COMPILADOR"
              echo "----------------------------------------------------"
              find . -name "android_gradle_build_stderr.txt" -exec cat {} +
              exit 1
            }
          
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Sonic-Mania-5Players-APK
          path: build-root/app/build/outputs/apk/debug/*.apk
          
