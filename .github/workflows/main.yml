name: Build Sonic Mania APK (5 Players)

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK
        run: |
          # 1. Localizar NDK mais recente disponível
          NDK_PATH=$(ls -d $ANDROID_SDK_ROOT/ndk/* | tail -1)
          echo "Utilizando NDK: $NDK_PATH"
          
          # 2. Entrar na pasta do projeto Android
          cd dependencies/RSDKv5/android
          
          # 3. Corrigir quebras de linha do Windows
          sed -i 's/\r$//' gradlew
          chmod +x gradlew
          
          # 4. Tentar compilar em modo DEBUG (mais rápido e gera logs melhores)
          # Adicionamos --info para ver o erro exato do C++
          ./gradlew assembleDebug \
            -Pandroid.ndkPath=$NDK_PATH \
            -Pandroid.lintOptions.abortOnError=false \
            --info --stacktrace
          
      - name: Upload APK
        if: always() # Faz o upload mesmo se falhar para tentarmos achar logs nos arquivos
        uses: actions/upload-artifact@v4
        with:
          name: Sonic-Mania-5Players-Debug-APK
          path: |
            dependencies/RSDKv5/android/app/build/outputs/apk/debug/*.apk
            dependencies/RSDKv5/android/app/build/reports/
